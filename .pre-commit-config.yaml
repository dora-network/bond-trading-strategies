# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        stages:
          - pre-commit
          - manual
      - id: end-of-file-fixer
        stages:
          - pre-commit
          - manual
      - id: check-yaml
        args: ["--unsafe"]
        stages:
          - pre-commit
          - manual
      - id: check-added-large-files
        stages:
          - pre-commit
          - manual
      - id: check-executables-have-shebangs
        stages:
          - pre-commit
          - manual
      - id: check-json
        stages:
          - pre-commit
          - manual
      - id: check-shebang-scripts-are-executable
        stages:
          - pre-commit
          - manual
      - id: check-symlinks
        stages:
          - pre-commit
          - manual
      - id: detect-private-key
        stages:
          - pre-commit
          - manual
      - id: mixed-line-ending
        stages:
          - pre-commit
          - manual
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages:
          - commit-msg
        additional_dependencies: ['@commitlint/config-conventional']
  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.2
    hooks:
      - id: go-imports-repo
        stages:
          - pre-commit
          - manual
        args: ["-w", "-d=false"]
        alias: go-imports
      - id: go-mod-tidy
        stages:
          - pre-commit
          - manual
        alias: go-mod-tidy
      - id: go-vet-repo-mod
        stages:
          - pre-commit
          - manual
        alias: go-vet
      - id: golangci-lint-repo-mod
        stages:
          - pre-commit
          - manual
        alias: golangci-lint
      - id: go-test-repo-mod
        stages:
          - pre-commit
          - manual
        verbose: true
        alias: go-test
      - id: go-test-repo-mod
        stages:
          - pre-commit
          - manual
        args:
          - --race
          - --hook:env:CGO_ENABLED=1
        verbose: true
        alias: go-test-race
