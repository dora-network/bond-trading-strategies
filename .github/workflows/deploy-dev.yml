name: Deploy dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency: deploy-bond-trading-dev

env:
  AWS_REGION: us-east-1
  REPOSITORY: dora-bond-trading-strategies

jobs:
  deploy:
    name: Build and deploy dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::425946675752:role/dora-github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-bond-trading-dev

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        shell: bash
        env:
          IMAGE_TAG: ${{ github.sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash .github/scripts/build-push-dev.sh

      - name: Deploy ECS services
        shell: bash
        env:
          IMAGE_TAG: ${{ github.sha }}
          DORA_API_KEY: ${{ secrets.DORA_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: bash .github/scripts/deploy-dev.sh
